name: Reusable DevSecOps Pipeline v2

on:
  workflow_call:
    inputs:
      # ── Target ───────────────────────────────────────────────────────────
      target_image:
        description: 'Imagen Docker del target (ej: bkimminich/juice-shop o ghcr.io/org/app:sha)'
        required: false
        type: string
        default: ''
      target_url:
        description: 'URL externa si la app ya está desplegada (sin Docker)'
        required: false
        type: string
        default: ''
      target_port:
        description: 'Puerto donde corre la app (ej: 3000)'
        required: false
        type: string
        default: '8080'

      # ── Metadata del servicio ─────────────────────────────────────────────
      service_name:
        description: 'Nombre del servicio para el reporte'
        required: true
        type: string
      criticality:
        description: 'Criticidad del negocio: high, medium, low'
        required: false
        type: string
        default: 'medium'
      environment:
        description: 'Entorno: staging, pre-prod'
        required: false
        type: string
        default: 'staging'

      # ── Build ─────────────────────────────────────────────────────────────
      build_context:
        description: 'Carpeta del Dockerfile si se construye local (opcional)'
        required: false
        type: string
        default: ''
      use_ghcr:
        description: 'true si la imagen está en GHCR privado y necesita login con GHCR_TOKEN'
        required: false
        type: boolean
        default: false

      # ── SAST: código fuente externo ───────────────────────────────────────
      source_repo:
        description: >
          Repo cuyo código fuente se escaneará con Semgrep.
          Formato: 'owner/repo' (ej: ManuelArango1229/Backend-FitFusion).
          Si se omite, Semgrep escanea el código del engine.
        required: false
        type: string
        default: ''
      source_repo_ref:
        description: 'Branch/tag/sha del source_repo a clonar (default: main)'
        required: false
        type: string
        default: 'main'

      # ── Lenguaje (override del auto-detector) ─────────────────────────────
      language:
        description: >
          Forzar lenguaje para Semgrep: nodejs, python, java, go, dotnet, php.
          Si se omite, se auto-detecta del código del engine o del source_repo.
        required: false
        type: string
        default: ''

    secrets:
      # ── IA ────────────────────────────────────────────────────────────────
      GROQ_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      ANTHROPIC_API_KEY:
        required: false

      # ── Runtime secrets del target ────────────────────────────────────────
      # Formato: "KEY1=valor1,KEY2=valor2,KEY3=valor3"
      # El caller extrae sus propios secrets de GitHub y los concatena aquí.
      # Ejemplo en el caller:
      #   APP_SECRETS: "MONGO_URI=${{ secrets.MONGO_URI }},JWT_SECRET=${{ secrets.JWT_SECRET }}"
      APP_SECRETS:
        required: false

      # Token para hacer pull de imágenes privadas en GHCR
      GHCR_TOKEN:
        required: false

jobs:

  # ── JOB 0: Auto-detector ─────────────────────────────────────────────────
  detect:
    name: Auto-detección de contexto
    runs-on: ubuntu-latest
    outputs:
      language:      ${{ steps.detect.outputs.language }}
      scan_mode:     ${{ steps.detect.outputs.scan_mode }}
      dast_enabled:  ${{ steps.detect.outputs.dast_enabled }}
      semgrep_rules: ${{ steps.detect.outputs.semgrep_rules }}
    steps:
      - name: Checkout ENGINE repo
        uses: actions/checkout@v4
        with:
          repository: ManuelArango1229/devsecops-engine-
          ref: main

      # Si hay source_repo, clonarlo para que el detector detecte su lenguaje
      - name: Checkout source repo (si aplica)
        if: ${{ inputs.source_repo != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.source_repo_ref }}
          path: source_to_scan
          token: ${{ secrets.GHCR_TOKEN || github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verificar estructura del engine
        run: |
          if [ ! -f scripts/detector.py ]; then
            echo "❌ FATAL: scripts/detector.py no existe"
            ls -la scripts/ 2>/dev/null || echo "scripts/ vacío"
            exit 1
          fi
          echo "✅ scripts/detector.py encontrado"

      - name: Run detector
        id: detect
        run: |
          mkdir -p reports

          # Analizar source_repo si existe, si no el engine
          DETECT_PATH="."
          if [ -n "${{ inputs.source_repo }}" ] && [ -d "source_to_scan" ]; then
            DETECT_PATH="source_to_scan"
            echo "🔍 Detectando lenguaje en: ${{ inputs.source_repo }}"
          fi

          python3 scripts/detector.py \
            --path "$DETECT_PATH" \
            --output reports/scan_config.json \
            --target-image "${{ inputs.target_image }}" \
            --target-url   "${{ inputs.target_url }}" \
            --service      "${{ inputs.service_name }}" \
            --criticality  "${{ inputs.criticality }}" \
            --environment  "${{ inputs.environment }}"

          python3 -c "
          import json, sys
          d = json.load(open('reports/scan_config.json'))
          needed = ['language', 'scan_mode', 'summary', 'tools', 'service']
          missing = [k for k in needed if k not in d]
          if missing:
              print('❌ scan_config.json incompleto:', missing)
              sys.exit(1)
          print('✅ scan_config.json válido')
          print('   service   :', d['service'])
          print('   language  :', d['language']['primary'])
          print('   scan_mode :', d['scan_mode']['mode'])
          print('   dast      :', d['summary']['dast_enabled'])
          "

          LANG=$(python3 -c "import json; d=json.load(open('reports/scan_config.json')); print(d['language']['primary'])")
          MODE=$(python3 -c "import json; d=json.load(open('reports/scan_config.json')); print(d['scan_mode']['mode'])")
          DAST=$(python3 -c "import json; d=json.load(open('reports/scan_config.json')); print(str(d['summary']['dast_enabled']).lower())")

          # Override de lenguaje si el caller lo especifica
          if [ -n "${{ inputs.language }}" ]; then
            LANG="${{ inputs.language }}"
            echo "⚡ Lenguaje forzado por el caller: $LANG"
          fi

          # Resolver reglas Semgrep según el lenguaje final
          RULES=$(python3 -c "
          rulesets = {
              'nodejs':  'p/nodejs p/javascript p/typescript',
              'python':  'p/python',
              'java':    'p/java',
              'go':      'p/golang',
              'dotnet':  'p/csharp',
              'php':     'p/php',
              'generic': 'p/python',
          }
          print(rulesets.get('$LANG', 'p/python'))
          ")

          echo "language=$LANG"        >> $GITHUB_OUTPUT
          echo "scan_mode=$MODE"       >> $GITHUB_OUTPUT
          echo "dast_enabled=$DAST"    >> $GITHUB_OUTPUT
          echo "semgrep_rules=$RULES"  >> $GITHUB_OUTPUT
          echo "✅ Lenguaje: $LANG | Modo: $MODE | DAST: $DAST | Reglas: $RULES"

      - uses: actions/upload-artifact@v4
        with:
          name: scan-config
          path: reports/scan_config.json

  # ── JOB 1: SAST ──────────────────────────────────────────────────────────
  sast-semgrep:
    name: SAST – Semgrep (${{ needs.detect.outputs.language }})
    runs-on: ubuntu-latest
    needs: [detect]
    steps:
      - name: Checkout ENGINE repo
        uses: actions/checkout@v4
        with:
          repository: ManuelArango1229/devsecops-engine-
          ref: main

      # Clonar el source_repo si el caller lo especificó
      - name: Checkout source repo para SAST
        if: ${{ inputs.source_repo != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.source_repo_ref }}
          path: source_to_scan
          token: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: |
          mkdir -p reports
          RULES="${{ needs.detect.outputs.semgrep_rules }}"

          # Escanear el source_repo si existe, si no el engine
          SCAN_PATH="."
          if [ -n "${{ inputs.source_repo }}" ] && [ -d "source_to_scan" ]; then
            SCAN_PATH="source_to_scan"
            echo "🔍 Semgrep escaneando: ${{ inputs.source_repo }}"
          else
            echo "🔍 Semgrep escaneando: engine (source_repo no especificado)"
          fi

          echo "Usando reglas: $RULES | Path: $SCAN_PATH"

          semgrep \
            --config $RULES \
            --json \
            --output reports/semgrep_report.json \
            --timeout 300 \
            --no-error "$SCAN_PATH" || true

          if [ ! -f reports/semgrep_report.json ] || [ ! -s reports/semgrep_report.json ]; then
            echo '{"results":[],"errors":[],"version":"1.0"}' > reports/semgrep_report.json
          fi

          python3 -c "
          import json
          d = json.load(open('reports/semgrep_report.json'))
          errs = d.get('errors', [])
          for e in errs[:3]:
              print('  ⚠️ Semgrep error:', e.get('message',''))
          print(f'Semgrep done: {len(d.get(\"results\",[]))} findings, {len(errs)} errores')
          "

      - uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: reports/semgrep_report.json

  # ── JOB 2: SCA ────────────────────────────────────────────────────────────
  sca-trivy:
    name: SCA – Trivy
    runs-on: ubuntu-latest
    needs: [detect]
    steps:
      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main \
            | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      # Login a GHCR si hay token (para imágenes privadas)
      - name: Login GHCR (imágenes privadas)
        if: ${{ inputs.use_ghcr }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Pull imagen Docker
        if: ${{ inputs.target_image != '' && inputs.target_url == '' }}
        run: |
          docker rm -f target-trivy 2>/dev/null || true
          if [ -n "${{ inputs.build_context }}" ]; then
            docker build -t ${{ inputs.target_image }} ${{ inputs.build_context }}
          else
            docker pull ${{ inputs.target_image }}
          fi
          echo "✅ Imagen lista: ${{ inputs.target_image }}"

      - name: Run Trivy – imagen Docker
        if: ${{ inputs.target_image != '' && inputs.target_url == '' }}
        run: |
          mkdir -p reports
          trivy image \
            --format json \
            --output reports/trivy_report.json \
            --severity CRITICAL,HIGH,MEDIUM \
            --scanners vuln,secret,misconfig \
            --no-progress \
            ${{ inputs.target_image }} || true

          COUNT=$(python3 -c "
          import json
          d = json.load(open('reports/trivy_report.json'))
          t = sum(len(r.get('Vulnerabilities') or []) for r in d.get('Results', []))
          print(t)
          " 2>/dev/null || echo 0)
          echo "Trivy image done: $COUNT vulnerabilidades"

      - name: Run Trivy – filesystem
        if: ${{ inputs.target_image == '' || inputs.target_url != '' }}
        run: |
          mkdir -p reports
          trivy fs \
            --format json \
            --output reports/trivy_report.json \
            --severity CRITICAL,HIGH,MEDIUM \
            --scanners vuln,secret,misconfig \
            --no-progress \
            . || true
          echo "Trivy filesystem done"

      - name: Garantizar reporte Trivy válido
        run: |
          if [ ! -f reports/trivy_report.json ] || [ ! -s reports/trivy_report.json ]; then
            echo '{"Results":[]}' > reports/trivy_report.json
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: reports/trivy_report.json

  # ── JOB 3: Reconocimiento activo ─────────────────────────────────────────
  recon:
    name: Reconocimiento Activo
    runs-on: ubuntu-latest
    needs: [detect]
    if: ${{ needs.detect.outputs.dast_enabled == 'true' }}
    steps:
      - name: Checkout ENGINE repo
        uses: actions/checkout@v4
        with:
          repository: ManuelArango1229/devsecops-engine-
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Login a GHCR si hay token
      - name: Login GHCR (imágenes privadas)
        if: ${{ inputs.use_ghcr }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Pull imagen Docker
        if: ${{ inputs.target_image != '' && inputs.target_url == '' }}
        run: |
          docker rm -f target-app 2>/dev/null || true
          if [ -n "${{ inputs.build_context }}" ]; then
            docker build -t ${{ inputs.target_image }} ${{ inputs.build_context }}
          else
            docker pull ${{ inputs.target_image }}
          fi

      - name: Start target app
        if: ${{ inputs.target_image != '' && inputs.target_url == '' }}
        env:
          APP_SECRETS: ${{ secrets.APP_SECRETS }}
        run: |
          docker rm -f target-app 2>/dev/null || true

          # Construir flags -e para cada variable de APP_SECRETS
          # Formato esperado: "KEY1=val1,KEY2=val2,KEY3=val3"
          ENV_FLAGS=""
          if [ -n "$APP_SECRETS" ]; then
            IFS=',' read -ra VARS <<< "$APP_SECRETS"
            for VAR in "${VARS[@]}"; do
              VAR_TRIMMED=$(echo "$VAR" | xargs)
              if [ -n "$VAR_TRIMMED" ]; then
                ENV_FLAGS="$ENV_FLAGS -e $VAR_TRIMMED"
              fi
            done
            echo "🔑 Inyectando $(echo $APP_SECRETS | tr ',' '\n' | wc -l) variables de entorno"
          fi

          docker run -d --name target-app \
            -p ${{ inputs.target_port }}:${{ inputs.target_port }} \
            $ENV_FLAGS \
            ${{ inputs.target_image }}

          echo "Esperando app en localhost:${{ inputs.target_port }}..."
          for i in $(seq 1 40); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 3 --connect-timeout 3 \
              http://localhost:${{ inputs.target_port }} 2>/dev/null || echo "000")
            echo "Intento $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "304" ] || [ "$STATUS" = "404" ]; then
              echo "✅ App lista (HTTP $STATUS)"; break
            fi
            if [ "$i" = "40" ]; then
              echo "⚠️ App no respondió tras 200s — continuando de todas formas"
              docker logs target-app --tail 30 || true
            fi
            sleep 5
          done

      - name: Set target URL
        id: target
        run: |
          if [ -n "${{ inputs.target_url }}" ]; then
            echo "url=${{ inputs.target_url }}" >> $GITHUB_OUTPUT
          else
            echo "url=http://localhost:${{ inputs.target_port }}" >> $GITHUB_OUTPUT
          fi

      - name: Install recon tools
        run: |
          sudo apt-get install -y nmap curl wget unzip 2>/dev/null || true
          pip install wafw00f --break-system-packages 2>/dev/null || true

          FFUF_VERSION="2.1.0"
          wget -q "https://github.com/ffuf/ffuf/releases/download/v${FFUF_VERSION}/ffuf_${FFUF_VERSION}_linux_amd64.tar.gz" \
            -O /tmp/ffuf.tar.gz && \
            tar -xzf /tmp/ffuf.tar.gz -C /tmp/ && \
            sudo mv /tmp/ffuf /usr/local/bin/ffuf && \
            chmod +x /usr/local/bin/ffuf && \
            echo "✅ ffuf instalado" || echo "⚠️ ffuf no disponible"

          HTTPX_VERSION="1.6.9"
          wget -q "https://github.com/projectdiscovery/httpx/releases/download/v${HTTPX_VERSION}/httpx_${HTTPX_VERSION}_linux_amd64.zip" \
            -O /tmp/httpx.zip && \
            unzip -q /tmp/httpx.zip -d /tmp/httpx_bin && \
            sudo mv /tmp/httpx_bin/httpx /usr/local/bin/httpx && \
            chmod +x /usr/local/bin/httpx && \
            echo "✅ httpx instalado" || echo "⚠️ httpx no disponible"

      - name: Run reconocimiento
        run: |
          mkdir -p reports
          python3 scripts/recon.py \
            --target "${{ steps.target.outputs.url }}" \
            --output reports/recon_context.json

      - name: Validar recon_context
        run: |
          TARGET="${{ steps.target.outputs.url }}"
          python3 -c "
          import json
          try:
              d = json.load(open('reports/recon_context.json'))
              if not d.get('nuclei_targets'):
                  d['nuclei_targets'] = ['$TARGET']
              assert d.get('schema_version')
              with open('reports/recon_context.json', 'w') as f:
                  json.dump(d, f, indent=2)
              print(f'✅ recon_context válido: {len(d[\"nuclei_targets\"])} targets')
          except Exception as e:
              print(f'⚠️ Regenerando recon_context: {e}')
              fallback = {
                  'schema_version': '1.0',
                  'target_url': '$TARGET',
                  'nuclei_targets': ['$TARGET'],
                  'summary': {
                      'open_ports': [${{ inputs.target_port }}],
                      'discovered_routes_count': 0,
                      'technologies': [],
                      'waf_present': False,
                      'missing_security_headers': [],
                      'attack_surface_findings': 0,
                  }
              }
              with open('reports/recon_context.json', 'w') as f:
                  json.dump(fallback, f, indent=2)
          "

      - uses: actions/upload-artifact@v4
        with:
          name: recon-context
          path: reports/recon_context.json

  # ── JOB 4: DAST – ZAP ────────────────────────────────────────────────────
  dast-zap:
    name: DAST – OWASP ZAP
    runs-on: ubuntu-latest
    needs: [detect, recon]
    if: ${{ needs.detect.outputs.dast_enabled == 'true' }}
    steps:
      - name: Checkout ENGINE repo
        uses: actions/checkout@v4
        with:
          repository: ManuelArango1229/devsecops-engine-
          ref: main

      - name: Login GHCR (imágenes privadas)
        if: ${{ inputs.use_ghcr }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Pull imagen Docker
        if: ${{ inputs.target_image != '' && inputs.target_url == '' }}
        run: |
          docker rm -f target-app 2>/dev/null || true
          if [ -n "${{ inputs.build_context }}" ]; then
            docker build -t ${{ inputs.target_image }} ${{ inputs.build_context }}
          else
            docker pull ${{ inputs.target_image }}
          fi

      - name: Start target app
        if: ${{ inputs.target_image != '' && inputs.target_url == '' }}
        env:
          APP_SECRETS: ${{ secrets.APP_SECRETS }}
        run: |
          docker rm -f target-app 2>/dev/null || true

          ENV_FLAGS=""
          if [ -n "$APP_SECRETS" ]; then
            IFS=',' read -ra VARS <<< "$APP_SECRETS"
            for VAR in "${VARS[@]}"; do
              VAR_TRIMMED=$(echo "$VAR" | xargs)
              [ -n "$VAR_TRIMMED" ] && ENV_FLAGS="$ENV_FLAGS -e $VAR_TRIMMED"
            done
            echo "🔑 Inyectando variables de entorno para ZAP"
          fi

          docker run -d --name target-app \
            -p ${{ inputs.target_port }}:${{ inputs.target_port }} \
            $ENV_FLAGS \
            ${{ inputs.target_image }}

          echo "Esperando app en localhost:${{ inputs.target_port }}..."
          for i in $(seq 1 40); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 3 --connect-timeout 3 \
              http://localhost:${{ inputs.target_port }} 2>/dev/null || echo "000")
            echo "Intento $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "304" ] || [ "$STATUS" = "404" ]; then
              echo "✅ App lista (HTTP $STATUS)"; break
            fi
            if [ "$i" = "40" ]; then
              echo "⚠️ App no respondió — continuando de todas formas"
              docker logs target-app --tail 30 || true
            fi
            sleep 5
          done

      - name: Download recon context
        uses: actions/download-artifact@v4
        with:
          name: recon-context
          path: reports/

      - name: Run ZAP Baseline
        run: |
          mkdir -p reports
          chmod -R 777 reports

          if [ -n "${{ inputs.target_url }}" ]; then
            TARGET_URL="${{ inputs.target_url }}"
          else
            TARGET_URL="http://localhost:${{ inputs.target_port }}"
          fi
          echo "ZAP target: $TARGET_URL"

          docker run --rm \
            --network host \
            -v $(pwd)/reports:/zap/wrk:rw \
            -u root \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t "$TARGET_URL" \
            -J /zap/wrk/zap_report.json \
            -r /zap/wrk/zap_report.html \
            -l WARN -I || true

          if [ ! -f reports/zap_report.json ] || [ ! -s reports/zap_report.json ]; then
            echo '{"site":[{"alerts":[]}],"@version":"2.14.0"}' > reports/zap_report.json
          fi

          COUNT=$(python3 -c "
          import json
          d = json.load(open('reports/zap_report.json'))
          print(sum(len(s.get('alerts',[])) for s in d.get('site',[])))
          " 2>/dev/null || echo 0)
          echo "ZAP done: $COUNT alertas"

      - uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: reports/zap_report.json

  # ── JOB 5: Pentesting – Nuclei ────────────────────────────────────────────
  pentest-nuclei:
    name: Pentesting – Nuclei (v3.3.8)
    runs-on: ubuntu-latest
    needs: [detect, recon]
    if: ${{ needs.detect.outputs.dast_enabled == 'true' }}
    steps:
      - name: Checkout ENGINE repo
        uses: actions/checkout@v4
        with:
          repository: ManuelArango1229/devsecops-engine-
          ref: main

      - name: Login GHCR (imágenes privadas)
        if: ${{ inputs.use_ghcr }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Pull imagen Docker
        if: ${{ inputs.target_image != '' && inputs.target_url == '' }}
        run: |
          docker rm -f target-app 2>/dev/null || true
          if [ -n "${{ inputs.build_context }}" ]; then
            docker build -t ${{ inputs.target_image }} ${{ inputs.build_context }}
          else
            docker pull ${{ inputs.target_image }}
          fi

      - name: Start target app
        if: ${{ inputs.target_image != '' && inputs.target_url == '' }}
        env:
          APP_SECRETS: ${{ secrets.APP_SECRETS }}
        run: |
          docker rm -f target-app 2>/dev/null || true

          ENV_FLAGS=""
          if [ -n "$APP_SECRETS" ]; then
            IFS=',' read -ra VARS <<< "$APP_SECRETS"
            for VAR in "${VARS[@]}"; do
              VAR_TRIMMED=$(echo "$VAR" | xargs)
              [ -n "$VAR_TRIMMED" ] && ENV_FLAGS="$ENV_FLAGS -e $VAR_TRIMMED"
            done
            echo "🔑 Inyectando variables de entorno para Nuclei"
          fi

          docker run -d --name target-app \
            -p ${{ inputs.target_port }}:${{ inputs.target_port }} \
            $ENV_FLAGS \
            ${{ inputs.target_image }}

          echo "Esperando app en localhost:${{ inputs.target_port }}..."
          for i in $(seq 1 40); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 3 --connect-timeout 3 \
              http://localhost:${{ inputs.target_port }} 2>/dev/null || echo "000")
            echo "Intento $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "304" ]; then
              echo "✅ App lista (HTTP $STATUS)"; break
            fi
            if [ "$i" = "40" ]; then
              echo "⚠️ App no respondió — continuando de todas formas"
              docker logs target-app --tail 30 || true
            fi
            sleep 5
          done

      - name: Download recon context
        uses: actions/download-artifact@v4
        with:
          name: recon-context
          path: reports/

      - name: Install Nuclei v3.3.8
        run: |
          wget -q https://github.com/projectdiscovery/nuclei/releases/download/v3.3.8/nuclei_3.3.8_linux_amd64.zip \
            -O /tmp/nuclei.zip
          unzip -q /tmp/nuclei.zip -d /tmp/nuclei_bin
          sudo mv /tmp/nuclei_bin/nuclei /usr/local/bin/nuclei
          chmod +x /usr/local/bin/nuclei
          nuclei -version

      - name: Update Nuclei templates
        run: nuclei -update-templates -silent || true

      - name: Set target URL
        id: target
        run: |
          if [ -n "${{ inputs.target_url }}" ]; then
            echo "url=${{ inputs.target_url }}" >> $GITHUB_OUTPUT
          else
            echo "url=http://localhost:${{ inputs.target_port }}" >> $GITHUB_OUTPUT
          fi

      - name: Run Nuclei con rutas del recon
        run: |
          mkdir -p reports
          TARGET="${{ steps.target.outputs.url }}"

          python3 -c "
          import json
          try:
              d = json.load(open('reports/recon_context.json'))
              targets = d.get('nuclei_targets', [])
              if not targets:
                  targets = ['$TARGET']
              with open('/tmp/nuclei_targets.txt', 'w') as f:
                  f.write('\n'.join(targets))
              print(f'✅ {len(targets)} targets para Nuclei')
          except Exception as e:
              print(f'⚠️ Usando target base: {e}')
              open('/tmp/nuclei_targets.txt','w').write('$TARGET')
          "

          nuclei \
            -list /tmp/nuclei_targets.txt \
            -tags owasp,jwt,sqli,xss,exposure,misconfig,cve,token,auth,api,swagger \
            -severity info,low,medium,high,critical \
            -json-export reports/nuclei_report.json \
            -timeout 30 \
            -rate-limit 50 \
            -silent || true

          if [ ! -f reports/nuclei_report.json ] || [ ! -s reports/nuclei_report.json ]; then
            echo '[]' > reports/nuclei_report.json
          fi

          COUNT=$(python3 -c "
          import json
          raw = open('reports/nuclei_report.json').read().strip()
          if raw.startswith('['):
              print(len(json.loads(raw)))
          else:
              print(len([l for l in raw.splitlines() if l.strip()]))
          " 2>/dev/null || echo 0)
          echo "Nuclei done: $COUNT findings"

      - uses: actions/upload-artifact@v4
        with:
          name: nuclei-report
          path: reports/nuclei_report.json

  # ── JOB 6: Evaluación IA + Gate + Reporte ────────────────────────────────
  ai-evaluation:
    name: Evaluacion IA + Security Gate
    runs-on: ubuntu-latest
    needs: [detect, sast-semgrep, sca-trivy, dast-zap, pentest-nuclei, recon]
    if: always()
    steps:
      - name: Checkout ENGINE repo
        uses: actions/checkout@v4
        with:
          repository: ManuelArango1229/devsecops-engine-
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install openai anthropic requests python-dotenv

      - name: Download semgrep-report
        uses: actions/download-artifact@v4
        with:
          name: semgrep-report
          path: reports/
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Download trivy-report
        uses: actions/download-artifact@v4
        with:
          name: trivy-report
          path: reports/
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Download zap-report
        uses: actions/download-artifact@v4
        with:
          name: zap-report
          path: reports/
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Download nuclei-report
        uses: actions/download-artifact@v4
        with:
          name: nuclei-report
          path: reports/
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Download recon-context
        uses: actions/download-artifact@v4
        with:
          name: recon-context
          path: reports/
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Download scan-config
        uses: actions/download-artifact@v4
        with:
          name: scan-config
          path: reports/
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Garantizar fallbacks y verificar hallazgos
        run: |
          mkdir -p reports
          [ -f reports/semgrep_report.json ] || echo '{"results":[],"errors":[],"version":"1.0"}' > reports/semgrep_report.json
          [ -f reports/trivy_report.json   ] || echo '{"Results":[]}'                             > reports/trivy_report.json
          [ -f reports/zap_report.json     ] || echo '{"site":[{"alerts":[]}]}'                   > reports/zap_report.json
          [ -f reports/nuclei_report.json  ] || echo '[]'                                         > reports/nuclei_report.json
          [ -f reports/recon_context.json  ] || echo '{"schema_version":"1.0","nuclei_targets":[],"summary":{}}' > reports/recon_context.json
          [ -f reports/scan_config.json    ] || echo '{"schema_version":"1.0"}'                   > reports/scan_config.json

          echo "📁 Archivos en reports/:"
          ls -lah reports/

          python3 -c "
          import json
          try:
              d = json.load(open('reports/semgrep_report.json'))
              print('  semgrep :', len(d.get('results', [])), 'findings')
          except Exception as e: print('  semgrep : error -', e)
          try:
              d = json.load(open('reports/trivy_report.json'))
              t = sum(len(r.get('Vulnerabilities') or []) for r in d.get('Results', []))
              print('  trivy   :', t, 'vulnerabilidades')
          except Exception as e: print('  trivy   : error -', e)
          try:
              d = json.load(open('reports/zap_report.json'))
              t = sum(len(s.get('alerts', [])) for s in d.get('site', []))
              print('  zap     :', t, 'alertas')
          except Exception as e: print('  zap     : error -', e)
          try:
              raw = open('reports/nuclei_report.json').read().strip()
              t = len(json.loads(raw)) if raw.startswith('[') else len([l for l in raw.splitlines() if l.strip()])
              print('  nuclei  :', t, 'findings')
          except Exception as e: print('  nuclei  : error -', e)
          "

      - name: Normalize findings
        env:
          SERVICE_NAME:  ${{ inputs.service_name }}
          ENVIRONMENT:   ${{ inputs.environment }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python3 scripts/normalizer.py \
            --semgrep reports/semgrep_report.json \
            --trivy   reports/trivy_report.json \
            --zap     reports/zap_report.json \
            --nuclei  reports/nuclei_report.json \
            --output  reports/findings.json

          python3 -c "
          import json
          d = json.load(open('reports/findings.json'))
          s = d.get('summary', {})
          print('=== FINDINGS NORMALIZADOS ===')
          print('  Total   :', s.get('total', 0))
          print('  CRITICAL:', s.get('by_severity', {}).get('CRITICAL', 0))
          print('  HIGH    :', s.get('by_severity', {}).get('HIGH', 0))
          print('  MEDIUM  :', s.get('by_severity', {}).get('MEDIUM', 0))
          print('  By tool :', d.get('tools_executed', {}))
          "

      - name: AI Evaluation
        env:
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERVICE_NAME:      ${{ inputs.service_name }}
          ENVIRONMENT:       ${{ inputs.environment }}
          GITHUB_RUN_ID:     ${{ github.run_id }}
        run: |
          python3 scripts/ai_engine.py \
            --findings    reports/findings.json \
            --output      reports/ai_evaluation.json \
            --service      "${{ inputs.service_name }}" \
            --criticality  "${{ inputs.criticality }}" \
            --environment  "${{ inputs.environment }}"

      - name: Security Gate
        run: |
          python3 scripts/gate.py \
            --findings      reports/findings.json \
            --ai-evaluation reports/ai_evaluation.json \
            --output        reports/gate_decision.json

      - name: Generate Report
        run: |
          python3 scripts/report_generator.py \
            --findings      reports/findings.json \
            --ai-evaluation reports/ai_evaluation.json \
            --gate-decision reports/gate_decision.json \
            --recon         reports/recon_context.json \
            --output        reports/SECURITY_REPORT.md

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: devsecops-final-report
          path: |
            reports/scan_config.json
            reports/recon_context.json
            reports/findings.json
            reports/ai_evaluation.json
            reports/gate_decision.json
            reports/SECURITY_REPORT.md
          retention-days: 30

      - name: Security Gate enforce
        run: |
          python3 scripts/gate.py \
            --findings      reports/findings.json \
            --ai-evaluation reports/ai_evaluation.json \
            --output        reports/gate_decision.json \
            --enforce