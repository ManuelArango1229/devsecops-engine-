name: Reusable DevSecOps Pipeline v2

on:
  workflow_call:
    inputs:
      target_image:
        description: 'Imagen Docker del target (ej: bkimminich/juice-shop)'
        required: false
        type: string
        default: ''
      target_url:
        description: 'URL externa si la app ya está desplegada (sin Docker)'
        required: false
        type: string
        default: ''
      target_port:
        description: 'Puerto donde corre la app (ej: 3000)'
        required: false
        type: string
        default: '8080'
      service_name:
        description: 'Nombre del servicio para el reporte'
        required: true
        type: string
      criticality:
        description: 'Criticidad del negocio: high, medium, low'
        required: false
        type: string
        default: 'medium'
      environment:
        description: 'Entorno: staging, pre-prod'
        required: false
        type: string
        default: 'staging'
      build_context:
        description: 'Carpeta del Dockerfile si se construye local (opcional)'
        required: false
        type: string
        default: ''
    secrets:
      GROQ_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      ANTHROPIC_API_KEY:
        required: false

jobs:

  # ── JOB 0: Auto-detector ─────────────────────────────────────────────────
  detect:
    name: Auto-detección de contexto
    runs-on: ubuntu-latest
    outputs:
      language: ${{ steps.detect.outputs.language }}
      scan_mode: ${{ steps.detect.outputs.scan_mode }}
      dast_enabled: ${{ steps.detect.outputs.dast_enabled }}
      semgrep_rules: ${{ steps.detect.outputs.semgrep_rules }}
    steps:
      - name: Checkout repo cliente (para detectar lenguaje)
        uses: actions/checkout@v4

      - name: Checkout ENGINE scripts
        uses: actions/checkout@v4
        with:
          repository: ManuelArango1229/devsecops-engine-
          ref: main
          path: engine

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run detector
        id: detect
        run: |
          mkdir -p reports
          python3 engine/scripts/detector.py \
            --path . \
            --output reports/scan_config.json \
            --target-image "${{ inputs.target_image }}" \
            --target-url "${{ inputs.target_url }}" \
            --service "${{ inputs.service_name }}" \
            --criticality "${{ inputs.criticality }}" \
            --environment "${{ inputs.environment }}"

          LANG=$(python3 -c "import json; d=json.load(open('reports/scan_config.json')); print(d['language']['primary'])")
          MODE=$(python3 -c "import json; d=json.load(open('reports/scan_config.json')); print(d['scan_mode']['mode'])")
          DAST=$(python3 -c "import json; d=json.load(open('reports/scan_config.json')); print(str(d['summary']['dast_enabled']).lower())")
          RULES=$(python3 -c "import json; d=json.load(open('reports/scan_config.json')); print(d['tools']['semgrep']['rulesets'])")

          echo "language=$LANG" >> $GITHUB_OUTPUT
          echo "scan_mode=$MODE" >> $GITHUB_OUTPUT
          echo "dast_enabled=$DAST" >> $GITHUB_OUTPUT
          echo "semgrep_rules=$RULES" >> $GITHUB_OUTPUT

          echo "✅ Lenguaje: $LANG | Modo: $MODE | DAST: $DAST"

      - uses: actions/upload-artifact@v4
        with:
          name: scan-config
          path: reports/scan_config.json

  # ── JOB 1: SAST ──────────────────────────────────────────────────────────
  sast-semgrep:
    name: SAST – Semgrep (${{ needs.detect.outputs.language }})
    runs-on: ubuntu-latest
    needs: [detect]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep con reglas detectadas
        run: |
          mkdir -p reports
          RULES="${{ needs.detect.outputs.semgrep_rules }}"
          echo "Usando reglas: $RULES"

          semgrep \
            --config $RULES \
            --json \
            --output reports/semgrep_report.json \
            --no-error . || true

          if [ ! -f reports/semgrep_report.json ] || [ ! -s reports/semgrep_report.json ]; then
            echo '{"results": [], "errors": [], "version": "1.0"}' > reports/semgrep_report.json
          fi

          COUNT=$(python3 -c "import json,sys; d=json.load(open('reports/semgrep_report.json')); print(len(d.get('results',[])))" 2>/dev/null || echo 0)
          echo "Semgrep done: $COUNT findings"

      - uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: reports/semgrep_report.json

  # ── JOB 2: SCA ────────────────────────────────────────────────────────────
  sca-trivy:
    name: SCA – Trivy
    runs-on: ubuntu-latest
    needs: [detect]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Pull image
        if: ${{ inputs.target_image != '' && inputs.target_url == '' }}
        run: |
          docker rm -f target-app 2>/dev/null || true
          if [ -n "${{ inputs.build_context }}" ]; then
            docker build -t ${{ inputs.target_image }} ${{ inputs.build_context }}
          else
            docker pull ${{ inputs.target_image }} || true
          fi

      - name: Run Trivy (imagen)
        if: ${{ inputs.target_image != '' && inputs.target_url == '' }}
        run: |
          mkdir -p reports
          trivy image \
            --format json \
            --output reports/trivy_report.json \
            --severity CRITICAL,HIGH,MEDIUM \
            --scanners vuln,secret,misconfig \
            --no-progress \
            ${{ inputs.target_image }} || true
          echo "Trivy image done"

      - name: Run Trivy (filesystem)
        if: ${{ inputs.target_image == '' || inputs.target_url != '' }}
        run: |
          mkdir -p reports
          trivy fs \
            --format json \
            --output reports/trivy_report.json \
            --severity CRITICAL,HIGH,MEDIUM \
            --scanners vuln,secret,misconfig \
            --no-progress \
            . || true
          echo "Trivy filesystem done"

      - name: Ensure trivy report exists
        run: |
          if [ ! -f reports/trivy_report.json ] || [ ! -s reports/trivy_report.json ]; then
            echo '{"Results": []}' > reports/trivy_report.json
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: reports/trivy_report.json

  # ── JOB 3: Reconocimiento activo ─────────────────────────────────────────
  recon:
    name: Reconocimiento Activo
    runs-on: ubuntu-latest
    needs: [detect]
    if: ${{ needs.detect.outputs.dast_enabled == 'true' }}
    steps:
      - name: Checkout ENGINE repo
        uses: actions/checkout@v4
        with:
          repository: ManuelArango1229/devsecops-engine-
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # FIX: docker rm -f antes de pull para evitar conflictos de nombre
      - name: Pull image
        if: ${{ inputs.target_image != '' && inputs.target_url == '' }}
        run: |
          docker rm -f target-app 2>/dev/null || true
          if [ -n "${{ inputs.build_context }}" ]; then
            docker build -t ${{ inputs.target_image }} ${{ inputs.build_context }}
          else
            docker pull ${{ inputs.target_image }} || true
          fi

      # FIX: health check usa localhost en lugar de ip route
      - name: Start target app
        if: ${{ inputs.target_image != '' && inputs.target_url == '' }}
        run: |
          docker rm -f target-app 2>/dev/null || true
          docker run -d --name target-app \
            -p ${{ inputs.target_port }}:${{ inputs.target_port }} \
            ${{ inputs.target_image }}
          echo "Esperando app en localhost:${{ inputs.target_port }}..."
          for i in $(seq 1 40); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 3 --connect-timeout 3 \
              http://localhost:${{ inputs.target_port }} 2>/dev/null || echo "000")
            echo "Intento $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "304" ]; then
              echo "✅ App lista (HTTP $STATUS)"
              break
            fi
            if [ "$i" = "40" ]; then
              echo "⚠️ App no respondió tras 200s, continuando de todas formas..."
              docker logs target-app --tail 20 || true
            fi
            sleep 5
          done

      # FIX: Set target URL usa localhost, no ip route
      - name: Set target URL
        id: target
        run: |
          if [ -n "${{ inputs.target_url }}" ]; then
            echo "url=${{ inputs.target_url }}" >> $GITHUB_OUTPUT
          else
            echo "url=http://localhost:${{ inputs.target_port }}" >> $GITHUB_OUTPUT
          fi

      # FIX: instalación por binario directo, sin go install
      - name: Install recon tools
        run: |
          sudo apt-get install -y nmap curl wget unzip 2>/dev/null || true
          pip install wafw00f --break-system-packages 2>/dev/null || true

          # ffuf por binario estable
          FFUF_VERSION="2.1.0"
          wget -q "https://github.com/ffuf/ffuf/releases/download/v${FFUF_VERSION}/ffuf_${FFUF_VERSION}_linux_amd64.tar.gz" \
            -O /tmp/ffuf.tar.gz && \
            tar -xzf /tmp/ffuf.tar.gz -C /tmp/ && \
            sudo mv /tmp/ffuf /usr/local/bin/ffuf && \
            chmod +x /usr/local/bin/ffuf && \
            echo "✅ ffuf $(ffuf -V 2>&1 | head -1)" || \
            echo "⚠️ ffuf no disponible, recon usará fallback"

          # httpx por binario estable
          HTTPX_VERSION="1.6.9"
          wget -q "https://github.com/projectdiscovery/httpx/releases/download/v${HTTPX_VERSION}/httpx_${HTTPX_VERSION}_linux_amd64.zip" \
            -O /tmp/httpx.zip && \
            unzip -q /tmp/httpx.zip -d /tmp/httpx_bin && \
            sudo mv /tmp/httpx_bin/httpx /usr/local/bin/httpx && \
            chmod +x /usr/local/bin/httpx && \
            echo "✅ httpx instalado" || \
            echo "⚠️ httpx no disponible, usará curl fallback"

      - name: Run reconocimiento
        run: |
          mkdir -p reports
          python3 scripts/recon.py \
            --target "${{ steps.target.outputs.url }}" \
            --output reports/recon_context.json

      - name: Ensure recon report exists
        run: |
          if [ ! -f reports/recon_context.json ] || [ ! -s reports/recon_context.json ]; then
            echo '{
              "schema_version": "1.0",
              "target_url": "${{ steps.target.outputs.url }}",
              "nuclei_targets": ["${{ steps.target.outputs.url }}"],
              "summary": {
                "open_ports": [${{ inputs.target_port }}],
                "discovered_routes_count": 0,
                "technologies": [],
                "waf_present": false,
                "missing_security_headers": [],
                "attack_surface_findings": 0
              }
            }' > reports/recon_context.json
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: recon-context
          path: reports/recon_context.json

  # ── JOB 4: DAST – ZAP ────────────────────────────────────────────────────
  dast-zap:
    name: DAST – OWASP ZAP
    runs-on: ubuntu-latest
    needs: [detect, recon]
    if: ${{ needs.detect.outputs.dast_enabled == 'true' }}
    steps:
      - name: Checkout ENGINE repo
        uses: actions/checkout@v4
        with:
          repository: ManuelArango1229/devsecops-engine-
          ref: main

      # FIX: docker rm -f antes de pull
      - name: Pull image
        if: ${{ inputs.target_image != '' && inputs.target_url == '' }}
        run: |
          docker rm -f target-app 2>/dev/null || true
          if [ -n "${{ inputs.build_context }}" ]; then
            docker build -t ${{ inputs.target_image }} ${{ inputs.build_context }}
          else
            docker pull ${{ inputs.target_image }} || true
          fi

      # FIX: health check con localhost
      - name: Start target app
        if: ${{ inputs.target_image != '' && inputs.target_url == '' }}
        run: |
          docker rm -f target-app 2>/dev/null || true
          docker run -d --name target-app \
            -p ${{ inputs.target_port }}:${{ inputs.target_port }} \
            ${{ inputs.target_image }}
          echo "Esperando app en localhost:${{ inputs.target_port }}..."
          for i in $(seq 1 40); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 3 --connect-timeout 3 \
              http://localhost:${{ inputs.target_port }} 2>/dev/null || echo "000")
            echo "Intento $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "304" ]; then
              echo "✅ App lista (HTTP $STATUS)"
              break
            fi
            if [ "$i" = "40" ]; then
              echo "⚠️ App no respondió tras 200s, continuando de todas formas..."
              docker logs target-app --tail 20 || true
            fi
            sleep 5
          done

      - name: Download recon context
        uses: actions/download-artifact@v4
        with:
          name: recon-context
          path: reports/

      # FIX: --network host para que ZAP alcance localhost del runner
      # FIX: target URL usa localhost, no ip route
      - name: Run ZAP Baseline
        run: |
          mkdir -p reports
          chmod -R 777 reports

          if [ -n "${{ inputs.target_url }}" ]; then
            TARGET_URL="${{ inputs.target_url }}"
          else
            TARGET_URL="http://localhost:${{ inputs.target_port }}"
          fi

          echo "ZAP target: $TARGET_URL"

          docker run --rm \
            --network host \
            -v $(pwd)/reports:/zap/wrk:rw \
            -u root \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t $TARGET_URL \
            -J /zap/wrk/zap_report.json \
            -r /zap/wrk/zap_report.html \
            -l WARN -I || true

          if [ ! -f reports/zap_report.json ] || [ ! -s reports/zap_report.json ]; then
            echo '{"site":[{"alerts":[]}],"@version":"2.14.0"}' > reports/zap_report.json
          fi
          echo "ZAP done"

      - uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: reports/zap_report.json

  # ── JOB 5: Pentesting – Nuclei ────────────────────────────────────────────
  pentest-nuclei:
    name: Pentesting – Nuclei (v3.3.8)
    runs-on: ubuntu-latest
    needs: [detect, recon]
    if: ${{ needs.detect.outputs.dast_enabled == 'true' }}
    steps:
      - name: Checkout ENGINE repo
        uses: actions/checkout@v4
        with:
          repository: ManuelArango1229/devsecops-engine-
          ref: main

      # FIX: docker rm -f antes de pull
      - name: Pull image
        if: ${{ inputs.target_image != '' && inputs.target_url == '' }}
        run: |
          docker rm -f target-app 2>/dev/null || true
          if [ -n "${{ inputs.build_context }}" ]; then
            docker build -t ${{ inputs.target_image }} ${{ inputs.build_context }}
          else
            docker pull ${{ inputs.target_image }} || true
          fi

      # FIX: health check con localhost
      - name: Start target app
        if: ${{ inputs.target_image != '' && inputs.target_url == '' }}
        run: |
          docker rm -f target-app 2>/dev/null || true
          docker run -d --name target-app \
            -p ${{ inputs.target_port }}:${{ inputs.target_port }} \
            ${{ inputs.target_image }}
          echo "Esperando app en localhost:${{ inputs.target_port }}..."
          for i in $(seq 1 40); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 3 --connect-timeout 3 \
              http://localhost:${{ inputs.target_port }} 2>/dev/null || echo "000")
            echo "Intento $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "304" ]; then
              echo "✅ App lista (HTTP $STATUS)"
              break
            fi
            if [ "$i" = "40" ]; then
              echo "⚠️ App no respondió tras 200s, continuando de todas formas..."
              docker logs target-app --tail 20 || true
            fi
            sleep 5
          done

      - name: Download recon context
        uses: actions/download-artifact@v4
        with:
          name: recon-context
          path: reports/

      - name: Install Nuclei v3.3.8
        run: |
          wget -q https://github.com/projectdiscovery/nuclei/releases/download/v3.3.8/nuclei_3.3.8_linux_amd64.zip \
            -O /tmp/nuclei.zip
          unzip -q /tmp/nuclei.zip -d /tmp/nuclei_bin
          sudo mv /tmp/nuclei_bin/nuclei /usr/local/bin/nuclei
          chmod +x /usr/local/bin/nuclei
          nuclei -version

      - name: Update Nuclei templates
        run: nuclei -update-templates -silent || true

      # FIX: Set target URL usa localhost, no ip route
      - name: Set target URL
        id: target
        run: |
          if [ -n "${{ inputs.target_url }}" ]; then
            echo "url=${{ inputs.target_url }}" >> $GITHUB_OUTPUT
          else
            echo "url=http://localhost:${{ inputs.target_port }}" >> $GITHUB_OUTPUT
          fi

      - name: Run Nuclei con rutas del recon
        run: |
          mkdir -p reports
          TARGET="${{ steps.target.outputs.url }}"

          python3 -c "
          import json, sys
          try:
              d = json.load(open('reports/recon_context.json'))
              targets = d.get('nuclei_targets', ['$TARGET'])
              with open('/tmp/nuclei_targets.txt', 'w') as f:
                  f.write('\n'.join(targets))
              print(f'Targets para Nuclei: {len(targets)}')
          except Exception as e:
              print(f'Sin recon context, usando target base: {e}')
              with open('/tmp/nuclei_targets.txt', 'w') as f:
                  f.write('$TARGET')
          "

          nuclei \
            -list /tmp/nuclei_targets.txt \
            -tags owasp,jwt,sqli,xss,exposure,misconfig,cve,token,auth,api,swagger \
            -severity info,low,medium,high,critical \
            -json-export reports/nuclei_report.json \
            -timeout 30 \
            -rate-limit 50 \
            -silent || true

          if [ ! -f reports/nuclei_report.json ] || [ ! -s reports/nuclei_report.json ]; then
            echo '[]' > reports/nuclei_report.json
          fi

          echo "Nuclei done: $(wc -l < reports/nuclei_report.json) findings"

      - uses: actions/upload-artifact@v4
        with:
          name: nuclei-report
          path: reports/nuclei_report.json

  # ── JOB 6: Evaluación IA + Gate + Reporte ────────────────────────────────
  ai-evaluation:
    name: Evaluacion IA + Security Gate
    runs-on: ubuntu-latest
    needs: [detect, sast-semgrep, sca-trivy, dast-zap, pentest-nuclei, recon]
    if: always()
    steps:
      - name: Checkout ENGINE repo
        uses: actions/checkout@v4
        with:
          repository: ManuelArango1229/devsecops-engine-
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install openai anthropic requests python-dotenv

      # FIX: descarga tolerante a fallos — si un job se saltó, su artifact
      # no existe; en lugar de fallar todo el pipeline, creamos un fallback.
      - name: Download artifacts (tolerante a fallos)
        run: |
          mkdir -p reports

          download_artifact() {
            local NAME=$1
            local DEST=$2
            local FALLBACK=$3
            echo "→ Descargando $NAME..."
            # actions/download-artifact falla si el artifact no existe;
            # usamos gh cli con --skip-existing para evitar el fallo.
            gh run download ${{ github.run_id }} \
              --name "$NAME" \
              --dir "$DEST" 2>/dev/null && \
              echo "  ✅ $NAME descargado" || \
              { echo "  ⚠️ $NAME no disponible — usando fallback"; echo "$FALLBACK" > "$DEST/$(basename $DEST)_fallback.json"; }
          }

          # Semgrep
          gh run download ${{ github.run_id }} --name semgrep-report --dir reports/ 2>/dev/null || \
            echo '{"results":[],"errors":[],"version":"1.0"}' > reports/semgrep_report.json

          # Trivy
          gh run download ${{ github.run_id }} --name trivy-report --dir reports/ 2>/dev/null || \
            echo '{"Results":[]}' > reports/trivy_report.json

          # ZAP (puede no existir si DAST fue omitido)
          gh run download ${{ github.run_id }} --name zap-report --dir reports/ 2>/dev/null || \
            echo '{"site":[{"alerts":[]}],"@version":"2.14.0"}' > reports/zap_report.json

          # Nuclei (puede no existir si DAST fue omitido)
          gh run download ${{ github.run_id }} --name nuclei-report --dir reports/ 2>/dev/null || \
            echo '[]' > reports/nuclei_report.json

          # Recon context (puede no existir si DAST fue omitido)
          gh run download ${{ github.run_id }} --name recon-context --dir reports/ 2>/dev/null || \
            echo '{"schema_version":"1.0","nuclei_targets":[],"summary":{}}' > reports/recon_context.json

          # Scan config
          gh run download ${{ github.run_id }} --name scan-config --dir reports/ 2>/dev/null || \
            echo '{"schema_version":"1.0"}' > reports/scan_config.json

          echo ""
          echo "📁 Archivos en reports/:"
          ls -lah reports/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Normalize findings
        run: |
          python3 scripts/normalizer.py \
            --semgrep reports/semgrep_report.json \
            --trivy reports/trivy_report.json \
            --zap reports/zap_report.json \
            --nuclei reports/nuclei_report.json \
            --output reports/findings.json

      - name: AI Evaluation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERVICE_NAME: ${{ inputs.service_name }}
          ENVIRONMENT: ${{ inputs.environment }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python3 scripts/ai_engine.py \
            --findings reports/findings.json \
            --output reports/ai_evaluation.json \
            --service "${{ inputs.service_name }}" \
            --criticality "${{ inputs.criticality }}" \
            --environment "${{ inputs.environment }}"

      - name: Security Gate (solo evaluación)
        run: |
          python3 scripts/gate.py \
            --findings reports/findings.json \
            --ai-evaluation reports/ai_evaluation.json \
            --output reports/gate_decision.json

      - name: Generate Report
        run: |
          python3 scripts/report_generator.py \
            --findings reports/findings.json \
            --ai-evaluation reports/ai_evaluation.json \
            --gate-decision reports/gate_decision.json \
            --output reports/SECURITY_REPORT.md

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: devsecops-final-report
          path: |
            reports/scan_config.json
            reports/recon_context.json
            reports/findings.json
            reports/ai_evaluation.json
            reports/gate_decision.json
            reports/SECURITY_REPORT.md
          retention-days: 30

      # FIX: enforce en step separado al final para que el upload siempre ocurra
      - name: Security Gate (enforce — puede fallar el pipeline)
        run: |
          python3 scripts/gate.py \
            --findings reports/findings.json \
            --ai-evaluation reports/ai_evaluation.json \
            --output reports/gate_decision.json \
            --enforce